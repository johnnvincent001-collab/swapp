<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products - SWAPP</title>

  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: #f5f6fa;
      color: #333;
    }

    a {
      color: inherit;
      text-decoration: none;
      outline: none;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: #fff;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 2px 0 5px rgba(0,0,0,.05);
      transition: width .3s;
    }

    .sidebar.minimized {
      width: 80px;
    }

    .sidebar.minimized .brand,
    .sidebar.minimized .text {
      display: none;
    }

    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      margin-bottom: 20px;
      font-size: 22px;
    }

    .brand {
      font-weight: 700;
      font-size: 24px;
      margin-bottom: 30px;
    }

    .brand .a { color: #3498db; }
    .brand .b { color: #dbae80; }

    .nav {
      list-style: none;
    }

    .nav li {
      margin: 8px 0;
      border-radius: 8px;
    }

    /* ✅ ACTIVE SIDEBAR ITEM */
    .nav li.active {
      background: #eaf2ff;
      font-weight: bold;
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
      border-radius: 8px;
      transition: .25s ease;
    }

    .nav a:hover {
      background: #f0f0f0;
      transform: translateX(8px);
    }

    .material-symbols-outlined {
      font-size: 22px;
    }

    .logout {
      color: #555;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 12px 10px;
      border-radius: 8px;
    }

    .logout:hover {
      background: #f0f0f0;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.1);
      padding: 20px;
    }

    .search-box {
      margin-bottom: 15px;
    }

    .search-box input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      background: #f5f5f5;
    }

    tr:nth-child(even) {
      background: #fafafa;
    }

    .btn-delete {
      background: #c0392b;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-delete:hover:not(:disabled) {
      background: #a93226;
    }

    .btn-delete:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    th.actions-col,
    td.actions-col {
      width: 1%;
      white-space: nowrap;
      text-align: right;
    }
  </style>
</head>

<body>

<aside class="sidebar" id="sidebar">
  <div>
    <button class="toggle-btn" id="toggleSidebar">☰</button>

    <h1 class="brand">
      <span class="a">SW</span><span class="b">APP</span>
    </h1>

    <ul class="nav">
      <li>
        <a href="index.html">
          <span class="material-symbols-outlined">dashboard</span>
          <span class="text">Dashboard</span>
        </a>
      </li>

      <li>
        <a href="customers.html">
          <span class="material-symbols-outlined">group</span>
          <span class="text">Authorized Users</span>
        </a>
      </li>

      <!-- ✅ ACTIVE -->
      <li class="active">
        <a href="product.html">
          <span class="material-symbols-outlined">shopping_bag</span>
          <span class="text">Products</span>
        </a>
      </li>

      <li>
        <a href="reports.html">
          <span class="material-symbols-outlined">description</span>
          <span class="text">Reports</span>
        </a>
      </li>

      <li>
        <a href="reward-points.html">
          <span class="material-symbols-outlined">loyalty</span>
          <span class="text">Reward Points</span>
        </a>
      </li>

      <li>
        <a href="reward-system.html">
          <span class="material-symbols-outlined">tune</span>
          <span class="text">Reward Tiers &amp; Logs</span>
        </a>
      </li>

      <li>
        <a href="verification.html">
          <span class="material-symbols-outlined">badge</span>
          <span class="text">ID Verification</span>
        </a>
      </li>

      <!-- NAV: Settings disabled — remove display:none from this <li> to re-enable -->
      <li style="display: none;">
        <a href="settings.html">
          <span class="material-symbols-outlined">settings</span>
          <span class="text">Settings</span>
        </a>
      </li>
    </ul>
  </div>

  <div class="logout" id="logoutBtn">
    <span class="material-symbols-outlined">logout</span>
    <span class="text">Logout</span>
  </div>
</aside>

<main class="main">
  <h2>Products</h2>

  <section class="card">
    <div class="search-box">
      <input id="search" type="text" placeholder="Search products...">
    </div>

    <table id="productsTable">
      <thead>
        <tr>
          <th>Title</th>
          <th>Description</th>
          <th>Price</th>
          <th>Posted By</th>
          <th>Type</th>
          <th>Created At</th>
          <th class="actions-col">Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    onSnapshot,
    doc,
    deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBGuY2RM1xruYXNBe0xi_oa0Gl-HnLOGb8",
    authDomain: "swapp-7d52b.firebaseapp.com",
    projectId: "swapp-7d52b",
    storageBucket: "swapp-7d52b.firebasestorage.app"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  if (!localStorage.getItem("adminName")) {
    window.location.href = "login.html";
  }

  toggleSidebar.onclick = () => {
    sidebar.classList.toggle("minimized");
  };

  logoutBtn.onclick = () => {
    localStorage.removeItem("adminName");
    window.location.href = "login.html";
  };

  const postsRef = collection(db, "posts");
  const tableBody = document.querySelector("#productsTable tbody");
  const searchInput = document.getElementById("search");

  let allPosts = [];

  onSnapshot(postsRef, snapshot => {
    allPosts = snapshot.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));
    renderPosts(allPosts);
  });

  function renderPosts(posts) {
    tableBody.innerHTML = "";
    posts.forEach(post => {
      const row = document.createElement("tr");

      const tdTitle = document.createElement("td");
      tdTitle.textContent = post.title || "No Title";

      const tdDesc = document.createElement("td");
      tdDesc.textContent = post.description || "";

      const tdPrice = document.createElement("td");
      tdPrice.textContent =
        post.price === 0 || post.price === "0"
          ? "0"
          : post.price != null && post.price !== ""
            ? String(post.price)
            : "--";

      const tdUser = document.createElement("td");
      tdUser.textContent = post.userName || "Unknown";

      const tdType = document.createElement("td");
      tdType.textContent = post.type || "--";

      const tdDate = document.createElement("td");
      tdDate.textContent =
        post.timestamp?.toDate
          ? post.timestamp.toDate().toLocaleDateString()
          : "--";

      const tdActions = document.createElement("td");
      tdActions.className = "actions-col";

      const delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "btn-delete";
      delBtn.textContent = "Delete";
      delBtn.title = "Permanently remove this listing from Firestore";
      delBtn.addEventListener("click", () =>
        confirmAndDeletePost(post.id, post.title || "No Title", delBtn)
      );

      tdActions.appendChild(delBtn);
      row.append(
        tdTitle,
        tdDesc,
        tdPrice,
        tdUser,
        tdType,
        tdDate,
        tdActions
      );
      tableBody.appendChild(row);
    });
  }

  async function confirmAndDeletePost(postId, titleLabel, button) {
    const ok = window.confirm(
      `Permanently delete this listing?\n\n"${titleLabel}"\n\nThis cannot be undone.`
    );
    if (!ok) return;

    button.disabled = true;
    try {
      await deleteDoc(doc(db, "posts", postId));
    } catch (err) {
      console.error(err);
      window.alert(
        "Could not delete listing: " + (err && err.message ? err.message : String(err))
      );
      button.disabled = false;
    }
  }

  searchInput.addEventListener("input", () => {
    const q = searchInput.value.toLowerCase();
    const filtered = allPosts.filter(p =>
      (p.title || "").toLowerCase().includes(q) ||
      (p.description || "").toLowerCase().includes(q) ||
      (p.userName || "").toLowerCase().includes(q)
    );
    renderPosts(filtered);
  });
</script>

</body>
</html>
