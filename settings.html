<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings - SWAPP</title>

  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: #f5f6fa;
      color: #333;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: #fff;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 2px 0 5px rgba(0,0,0,.05);
      transition: width .3s;
    }

    .brand {
      font-weight: 700;
      font-size: 24px;
      margin-bottom: 30px;
    }

    .brand .a { color: #3498db; }
    .brand .b { color: #dbae80; }

    .nav {
      list-style: none;
    }

    .nav li {
      margin: 8px 0;
    }

    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
      border-radius: 8px;
      transition: .25s ease;
    }

    .nav a:hover {
      background: #f0f0f0;
      transform: translateX(8px);
    }

    .nav a.active {
      font-weight: bold;
    }

    .material-symbols-outlined {
      font-size: 22px;
    }

    .logout {
      color: #555;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 12px 10px;
      border-radius: 8px;
    }

    .logout:hover {
      background: #f0f0f0;
    }

    .sidebar.minimized {
      width: 80px;
    }

    .sidebar.minimized .brand,
    .sidebar.minimized .text {
      display: none;
    }

    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      font-size: 22px;
      color: #333;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.1);
      padding: 20px;
      margin-bottom: 20px;
    }

    .card h3 {
      margin-bottom: 15px;
      font-size: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .btn {
      background: #3498db;
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: .2s;
    }

    .btn:hover {
      background: #2980b9;
    }
  </style>
  <!-- SETTINGS_PAGE_DISABLED: redirect anyone who opens settings.html directly. Delete this script to re-enable the page. -->
  <script>
    (function () {
      if (!localStorage.getItem("adminName")) {
        window.location.replace("login.html");
        return;
      }
      window.location.replace("index.html");
    })();
  </script>
</head>

<body>

  
<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div>
    <button class="toggle-btn" id="toggleSidebar">☰</button>

    <h1 class="brand">
      <span class="a">SW</span><span class="b">APP</span>
    </h1>

    <ul class="nav">
      <li>
        <a href="index.html">
          <span class="material-symbols-outlined">dashboard</span>
          <span class="text">Dashboard</span>
        </a>
      </li>
      <li>
        <a href="customers.html">
          <span class="material-symbols-outlined">group</span>
          <span class="text">Authorized Users</span>
        </a>
      </li>
      <li>
        <a href="product.html">
          <span class="material-symbols-outlined">shopping_bag</span>
          <span class="text">Products</span>
        </a>
      </li>
      <li>
        <a href="reports.html">
          <span class="material-symbols-outlined">description</span>
          <span class="text">Reports</span>
        </a>
      </li>
      <li>
        <a href="reward-points.html">
          <span class="material-symbols-outlined">loyalty</span>
          <span class="text">Reward Points</span>
        </a>
      </li>
      <li>
        <a href="reward-system.html">
          <span class="material-symbols-outlined">tune</span>
          <span class="text">Reward Tiers &amp; Logs</span>
        </a>
      </li>
      <li>
        <a href="verification.html">
          <span class="material-symbols-outlined">badge</span>
          <span class="text">ID Verification</span>
        </a>
      </li>
      <!-- NAV: Settings disabled — remove display:none from this <li> to re-enable -->
      <li style="display: none;">
        <a href="settings.html" class="active">
          <span class="material-symbols-outlined">settings</span>
          <span class="text">Settings</span>
        </a>
      </li>
    </ul>
  </div>

  <div class="logout" id="logoutBtn">
    <span class="material-symbols-outlined">logout</span>
    <span class="text">Logout</span>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <h2>Settings</h2>

  <!-- Personal Details -->
  <section class="card">
    <h3>Personal Details</h3>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" placeholder="John Doe">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="johndoe@email.com">
    </div>

    <button class="btn">Save Changes</button>
  </section>

  <!-- Password -->
  <section class="card">
    <h3>Password</h3>

    <div class="form-group">
      <label>Current Password</label>
      <input type="password" placeholder="********">
    </div>

    <div class="form-group">
      <label>New Password</label>
      <input type="password" placeholder="New Password">
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" placeholder="Confirm Password">
    </div>

    <button class="btn">Change Password</button>
  </section>

  <!-- Identity Confirmation -->
  <section class="card">
    <h3>Identity Confirmation</h3>

    <div class="form-group">
      <label>Government ID Number</label>
      <input type="text" placeholder="Enter ID Number">
    </div>

    <div class="form-group">
      <label>Date of Birth</label>
      <input type="date">
    </div>

    <button class="btn">Save Identity Info</button>
  </section>

  <!-- Contact Info -->
  <section class="card">
    <h3>Contact Info</h3>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" placeholder="+63 912 345 6789">
    </div>

    <div class="form-group">
      <label>Address</label>
      <input type="text" placeholder="123 Street, City">
    </div>

    <button class="btn">Save Contact Info</button>
  </section>
</main>

<script>
  const toggleBtn = document.getElementById("toggleSidebar");
  const sidebar = document.getElementById("sidebar");

  toggleBtn.addEventListener("click", () => {
    sidebar.classList.toggle("minimized");
  });

  document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem("adminName");
    window.location.href = "login.html";
  });
</script>

</body>
</html>
